---
## Reference template for the playback voice catalogue.
##
## `npm run setup` copies this file to $XDG_CONFIG_HOME/playback/voices.yaml
## on first run. Edit that copy to add or customise voices for your user
## account. You can also create a project-local voices.yaml alongside your
## tape directory — project entries win over the XDG catalogue on name
## collision.
##
## The catalogue is read by:
##   - scripts/setup.sh    — bootstraps the XDG catalogue; downloads models
##   - src/voices.ts       — merges XDG + project catalogues at runtime
##   - src/schema/meta.ts  — validates voice selections in meta.yaml
##   - src/runner/piper.ts — resolves model file paths for synthesis
##   - tui/tape/voices.go  — voice display in the TUI
##
## To add a new voice:
##   1. Find it at https://rhasspy.github.io/piper-samples/
##   2. Add an entry below with the model name, locale, and URL path
##   3. Run `npm run setup` to download the model files
##
## The key (e.g. "northern_english_male") is what tapes reference in
## meta.yaml's `voices` field.

voices:
  alan:
    gender: male
    locale: en-GB
    model: en_GB-alan-medium
    quality: medium
    url: en/en_GB/alan/medium

  alba:
    gender: female
    locale: en-GB
    model: en_GB-alba-medium
    quality: medium
    url: en/en_GB/alba/medium

  northern_english_male:
    gender: male
    locale: en-GB
    model: en_GB-northern_english_male-medium
    quality: medium
    url: en/en_GB/northern_english_male/medium

  southern_english_female:
    gender: female
    locale: en-GB
    model: en_GB-southern_english_female-low
    quality: low
    url: en/en_GB/southern_english_female/low

  ## Multi-speaker example — Liverpool ARU Speech Corpus (12 speakers, Received Pronunciation).
  ## Each speaker entry shares the same model and url; only the key name and
  ## speaker ID differ. The model file downloads once regardless of how many
  ## speaker entries reference it. Speaker IDs come from the speaker_id_map in
  ## the model's .onnx.json file.
  aru_09:
    gender: female
    locale: en-GB
    model: en_GB-aru-medium
    quality: medium
    speaker: 4
    url: en/en_GB/aru/medium
