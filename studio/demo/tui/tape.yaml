---
title: The playback TUI editor
output: studio/demo/tui
steps:
  # Reset the example tape to its pristine overlapping state.
  - action: type
    command: cp studio/example/tape/tape.pristine.yaml studio/example/tape/tape.yaml
    pause: 0.3

  - action: run
    pause: 0.2

  # Brief pause for the shell prompt to settle (suppresses zsh autosuggestion ghost text).
  - action: comment
    pause: 0.5

  # ~6s — Launch.
  - action: type
    command: npm run playback:demo
    narration: >
      The playback TUI is a post-production timing editor.
      Let's open a tape with overlapping narration.
    pause: 5.36

  # ~13s — TUI loaded. Let the viewer take in the interface.
    narrationOffset: 0
  - action: run
    narration: >
      The TUI shows terminal commands, a step list, and an audio
      timeline. Red markers highlight overlapping narration.
    pause: 7.66

  # ~21s — Navigate to step 4.
  # Narration starts on the comment, then j presses fire during it.
    narrationOffset: 0
  - action: comment
    narration: >
      Navigate with j and k. The inspector shows the overlap
      warning and narration offset.
    pause: 0.3
    narrationOffset: 0

  - action: key
    command: j
    pause: 1.2

  - action: key
    command: j
    pause: 1.2

  - action: key
    command: j
    pause: 1.2

  - action: key
    command: j
    pause: 1.5

  # ~26s — Fix first overlap.
  # Narration starts, then l presses fire during it.
  - action: comment
    narration: >
      Press l to slide the narration later. Each press shifts a
      quarter second. The overlap disappears.
    pause: 0.3
    narrationOffset: 0

  - action: key
    command: l
    pause: 1.5

  - action: key
    command: l
    pause: 1.5

  - action: key
    command: l
    pause: 2.5

  # ~32s — Navigate to second overlap.
  - action: key
    command: j
    narration: Fix the second overlap.
    narrationOffset: 0
    pause: 0.3

  - action: key
    command: j
    pause: 0.3

  # ~33s — Fix second overlap.
  - action: comment
    pause: 0.3

  - action: key
    command: l
    pause: 0.4

  - action: key
    command: l
    pause: 0.4

  - action: key
    command: l
    pause: 0.4

  - action: key
    command: l
    pause: 0.5

  # ~35s — Navigate to third overlap.
  - action: key
    command: j
    narration: And the third.
    narrationOffset: 0
    pause: 0.3

  - action: key
    command: j
    pause: 0.3

  # ~36s — Fix third overlap.
  - action: comment
    pause: 0.3

  - action: key
    command: l
    pause: 0.5

  - action: key
    command: l
    pause: 1.5

  # ~38s — Save.
  - action: narrate
    commands:
      - s
    narration: >
      Press s to save. The offsets write back to tape.yaml.
    narrationOffset: 0
    pause: 3.5

  # ~41s — Tape picker.
  - action: comment
    narration: Press o to switch between tapes.
    narrationOffset: 0.5
    pause: 1

  - action: key
    command: o
    pause: 3

  - action: key
    command: Escape
    pause: 1

  # ~44s — Help.
  - action: comment
    narration: Question mark for the keybinding reference.
    pause: 0.3
    narrationOffset: 0

  - action: key
    command: "?"
    pause: 2.5

  - action: key
    command: "?"
    pause: 1

  # ~48s — Quit.
  - action: comment
    narration: >
      And q to quit. That's the playback TUI.
    pause: 0.3
    narrationOffset: 0

  - action: key
    command: q
    pause: 1
